<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Scythe: Panamerica — Prototype v0.9</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,600;0,8..60,700;1,8..60,400&family=IM+Fell+English+SC&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0d0c08;--bg2:#161410;--bg3:#1e1b15;--panel:#1a1812;
  --gold:#d4b254;--gold-dim:#8a6e3a;--gold-light:#ecd080;--brass:#c4a060;--copper:#b08060;
  --text:#e8dcc4;--text-dim:#a89878;--text-muted:#6a5c44;
  --border:#322a1e;--border-light:#4a3e2e;
  --red:#c83828;--green:#4a9a3a;--blue:#3478d0;
  --danger:#d43838;--success:#50b050;
  /* Sizing tokens */
  --top-h:52px;--side-w:54px;--bottom-max:40vh;
  --fs-xs:10px;--fs-sm:12px;--fs-md:14px;--fs-lg:16px;--fs-xl:20px;
  --btn-min:40px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
body{background:var(--bg);color:var(--text);font-family:'Source Serif 4',Georgia,serif;overflow-x:hidden;-webkit-font-smoothing:antialiased;}
button{font-family:'Source Serif 4',Georgia,serif;cursor:pointer;transition:all .15s ease;-webkit-tap-highlight-color:transparent;}
button:hover{filter:brightness(1.1);}
button:active{transform:scale(0.97);filter:brightness(0.95);}
h1,h2,h3{font-family:'Playfair Display',serif;font-weight:400;letter-spacing:0.08em;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--gold-dim);border-radius:4px;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.35;}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
@keyframes breathe{0%,100%{opacity:.2;}50%{opacity:.55;}}
@keyframes riverFlow{0%{stroke-dashoffset:0;}100%{stroke-dashoffset:-16;}}
@keyframes empireGlow{0%,100%{filter:drop-shadow(0 0 4px #ff2200);}50%{filter:drop-shadow(0 0 10px #ff4400);}}
@keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
@keyframes slideUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
@keyframes combatFlash{0%,100%{background:rgba(160,30,15,0.08);}50%{background:rgba(160,30,15,0.02);}}
@keyframes starBurst{0%{transform:scale(1);filter:brightness(1);}25%{transform:scale(1.4);filter:brightness(2) drop-shadow(0 0 12px #ffd700);}50%{transform:scale(1.1);filter:brightness(1.3);}100%{transform:scale(1);filter:brightness(1);}}
@keyframes slideDown{from{opacity:0;max-height:0;transform:translateY(-8px);}to{opacity:1;max-height:500px;transform:translateY(0);}}
@keyframes glowPulse{0%,100%{box-shadow:0 0 0 rgba(201,168,76,0);}50%{box-shadow:0 0 16px rgba(201,168,76,0.25);}}
@keyframes botPulse{0%,100%{border-color:rgba(255,100,40,0.15);}50%{border-color:rgba(255,100,40,0.5);}}
@keyframes logSlide{from{opacity:0;transform:translateX(-10px);}to{opacity:1;transform:translateX(0);}}
@keyframes hexRipple{0%{r:0;opacity:0.6;}100%{r:40;opacity:0;}}
.fade-in{animation:fadeIn .35s ease-out both;}
.slide-up{animation:slideUp .3s ease-out both;}
svg text{-webkit-user-select:none;user-select:none;}
.enc-card{background:linear-gradient(160deg,#1e1a12,#14120d);border:1px solid var(--border-light);border-radius:10px;padding:16px 18px;cursor:pointer;text-align:left;transition:all .2s;}
.enc-card:hover{border-color:var(--gold);box-shadow:0 0 20px rgba(201,168,76,0.1);transform:translateY(-2px);}
.rr-card{background:linear-gradient(160deg,#1a1208,#100e08);border-radius:10px;padding:14px 16px;cursor:pointer;text-align:left;transition:all .2s;position:relative;overflow:hidden;}
.rr-card.ford{border:1px solid #4a5a6a;}
.rr-card.tesla{border:1px solid #7050a0;}
.rr-card:hover{transform:translateY(-2px);box-shadow:0 4px 20px rgba(0,0,0,0.5);}
.rr-card.ford:hover{border-color:#7a9ab0;box-shadow:0 0 18px rgba(100,140,180,0.15);}
.rr-card.tesla:hover{border-color:#a070d0;box-shadow:0 0 18px rgba(140,80,200,0.18);}
.combat-panel{border-bottom:2px solid var(--danger);animation:combatFlash 3s ease-in-out infinite,slideUp 0.3s ease;}
.reward-panel{border-bottom:2px solid var(--success);background:linear-gradient(180deg,rgba(20,80,20,0.08),var(--bg2));}
.dial-btn{width:36px;height:36px;border-radius:6px;font-size:var(--fs-sm);font-weight:700;display:flex;align-items:center;justify-content:center;font-family:inherit;}
.dial-btn.off{background:var(--bg3);color:var(--text-dim);border:1px solid var(--border);}
.dial-btn.on{background:var(--danger);color:#fff;border:1px solid #ff5544;box-shadow:0 0 8px rgba(200,40,30,0.4);}
/* Resource pill */
.res-pill{display:flex;align-items:center;gap:4px;padding:4px 8px;border-radius:6px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.04);min-width:44px;}
.res-pill .res-icon{font-size:13px;line-height:1;}
.res-pill .res-val{font-size:var(--fs-md);font-weight:700;font-family:'Playfair Display',serif;}
/* Action button base */
.act-btn{background:var(--bg3);border:1px solid var(--border-light);color:var(--text);border-radius:8px;padding:10px 14px;font-size:var(--fs-sm);cursor:pointer;font-family:'Source Serif 4',Georgia,serif;box-shadow:inset 0 1px 0 rgba(255,255,255,0.04);min-height:var(--btn-min);transition:all .2s ease;}
.act-btn:hover{border-color:var(--gold-dim);background:var(--bg2);transform:translateY(-1px);box-shadow:inset 0 1px 0 rgba(255,255,255,0.04),0 4px 12px rgba(0,0,0,0.3);}
.act-btn:active{transform:translateY(1px);box-shadow:none;transition:all .05s;}
.act-btn:disabled{opacity:0.3;cursor:not-allowed;transform:none !important;box-shadow:none !important;}
/* Section label */
.section-label{font-family:'IM Fell English SC',serif;font-size:var(--fs-xs);letter-spacing:3px;text-transform:uppercase;color:var(--brass);}
/* Log styling */
.log-line{color:var(--text-dim);padding:2px 0;font-size:var(--fs-xs);line-height:1.5;animation:logSlide 0.3s ease forwards;}
</style>
</head>

  frente:{name:"Peuple Armé",desc:"+1 carte si ≥1 ouvrier allié sur hex",

  nations:{name:"Ronin",desc:"+1 carte si mecha seul (0 ouvrier allié)",
    apply:(p,hexId)=>{const wOnHex=p.workers.filter(w=>w.hexId===hexId).length;return{powerBonus:0,cardBonus:wOnHex===0?1:0};}},

    apply:()=>({powerBonus:0,cardBonus:0})}, // Special: handled post-combat
  dominion:{name:"Discipline",desc:"+2 pui si plus de CC que l'adversaire",
    apply:(p,hexId,isAttacker,enemyCards)=>({powerBonus:(p.combatCards>(enemyCards||0))?2:0,cardBonus:0})},
};

// Get combat bonus for a player (only if slot 2 unlocked)
const getCombatBonus=(player, hexId, isAttacker, enemyCards)=>{
  if(!(player.unlockedAbilities||[]).includes(2)) return{powerBonus:0,cardBonus:0,name:null};
  const ability=COMBAT_ABILITIES[player.faction];
  if(!ability) return{powerBonus:0,cardBonus:0,name:null};
  const bonus=ability.apply(player, hexId, isAttacker, enemyCards);
  return{...bonus, name:ability.name};
};

// Check and apply ongoing enlist bonuses when player[actorIdx] does bottom action [bottomCol]
// Returns {players: modified array, logs: string[]}
const applyEnlistOngoing=(playersArr,actorIdx,bottomCol)=>{
  const n=playersArr.map(p=>({...p}));
  const logs=[];
  const count=n.length;
  if(count<2)return{players:n,logs};
  const leftIdx=(actorIdx-1+count)%count;
  const rightIdx=(actorIdx+1)%count;
  // Check self + left + right neighbor
  [actorIdx,leftIdx,rightIdx].forEach(pi=>{
    const p=n[pi];
    if((p.enlistMap||[])[bottomCol]){
      const bonus=ENLIST_ONGOING[bottomCol];
      if(bonus){
        bonus.apply(p);
        const actor=FACTIONS[n[actorIdx].faction]?.name||"?";
        const receiver=FACTIONS[p.faction]?.name||"?";
        if(pi===actorIdx) logs.push(`🤝 ${receiver}: ${bonus.icon}${bonus.label} (propre ${BOTTOM[bottomCol]})`);
        else logs.push(`🤝 ${receiver}: ${bonus.icon}${bonus.label} (voisin ${actor} → ${BOTTOM[bottomCol]})`);
      }
    }
  });
  return{players:n,logs};
};

// Resource helpers — count & spend across all controlled hexes
const countRes=(player,resType)=>{
  let total=0;
  Object.values(player.resources).forEach(r=>{if(r[resType])total+=r[resType];});
  return total;
};
const spendRes=(player,resType,qty)=>{
  const p={...player,resources:{}};
  // Deep copy resources
  Object.entries(player.resources).forEach(([hid,r])=>{p.resources[hid]={...r};});
  let left=qty;
  for(const hid of Object.keys(p.resources)){
    if(left<=0)break;
    const avail=p.resources[hid][resType]||0;
    if(avail>0){
      const take=Math.min(avail,left);
      p.resources[hid][resType]-=take;
      if(p.resources[hid][resType]<=0)delete p.resources[hid][resType];
      if(Object.keys(p.resources[hid]).length===0)delete p.resources[hid];
      left-=take;
    }
  }
  return p;
};

const shuffleArray=(arr)=>{const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;};

// ══════════ HEX MATH ══════════
const HS=54;
const hPts=(cx,cy,s)=>{const sz=s||HS;return Array.from({length:6},(_,i)=>{const a=(Math.PI/3)*i;return`${cx+sz*Math.cos(a)},${cy+sz*Math.sin(a)}`;}).join(" ");};
const hMap=Object.fromEntries(HEXES.map(h=>[h.id,h]));

const ADJ=(()=>{const a={};HEXES.forEach(h=>{a[h.id]=[];});for(let i=0;i<HEXES.length;i++)for(let j=i+1;j<HEXES.length;j++){const ha=HEXES[i],hb=HEXES[j];if(Math.sqrt((ha.rx-hb.rx)**2+(ha.ry-hb.ry)**2)<160){a[ha.id].push(hb.id);a[hb.id].push(ha.id);}}return a;})();
const RSET=new Set(RIVERS.map(([a,b])=>`${Math.min(a,b)}-${Math.max(a,b)}`));
const hasR=(a,b)=>RSET.has(`${Math.min(a,b)}-${Math.max(a,b)}`);

const edgeGeo=(idA,idB)=>{
  const a=hMap[idA],b=hMap[idB];if(!a||!b)return null;
  const mx=(a.rx+b.rx)/2,my=(a.ry+b.ry)/2,dx=b.rx-a.rx,dy=b.ry-a.ry,len=Math.sqrt(dx*dx+dy*dy);
  if(!len)return null;const px=-dy/len,py=dx/len,half=HS*0.52;
  return{x1:mx+px*half,y1:my+py*half,x2:mx-px*half,y2:my-py*half,mx,my};
};

// ══════════ GAME LOGIC ══════════
// 1-step movement (base + riverwalk + position abilities)
const getValidMoves1Step=(fromId,factionId,abilities,player,rails)=>{
  const f=FACTIONS[factionId],from=hMap[fromId],adj=ADJ[fromId]||[];
  const hasRiverwalk=abilities&&abilities.includes(1);
  const hasPosition=abilities&&abilities.includes(3);
  let cands=[...adj];
  
  // ── RAIL NETWORK: all connected hexes reachable in 1 move ──
  if(rails&&rails.length>0){
    // BFS from fromId through rail segments
    const visited=new Set([fromId]);
    const queue=[fromId];
    while(queue.length>0){
      const cur=queue.shift();
      rails.forEach(([a,b])=>{
        const next=a===cur?b:b===cur?a:null;
        if(next!==null&&!visited.has(next)){visited.add(next);queue.push(next);if(!cands.includes(next))cands.push(next);}
      });
    }
  }
  
  // ── POSITION ABILITIES (slot 3) ──
  if(hasPosition){
    // Bayou Walk: all marécages adjacent
    if(factionId==="bayou"&&from.t==="marecage")
      HEXES.forEach(h=>{if(h.t==="marecage"&&h.id!==fromId&&!cands.includes(h.id))cands.push(h.id);});
    // Terrier: all sierras adjacent to each other
    if(factionId==="frente"&&from.t==="sierra")
      HEXES.forEach(h=>{if(h.t==="sierra"&&h.id!==fromId&&!cands.includes(h.id))cands.push(h.id);});
    // Township: controlled villages ↔ Rouge River
    if(factionId==="confederation"&&player){
      const unitHexes=new Set([player.hero,...player.workers.map(w=>w.hexId),...player.mechs.map(m=>m.hexId)]);
      const ctrlVillages=HEXES.filter(h=>h.t==="village"&&unitHexes.has(h.id)).map(h=>h.id);
      if(from.t==="village"||from.t==="factory"){
        ctrlVillages.forEach(v=>{if(v!==fromId&&!cands.includes(v))cands.push(v);});
        if(fromId!==FACTORY_RR_HEX&&!cands.includes(FACTORY_RR_HEX))cands.push(FACTORY_RR_HEX);
      }
      if(fromId===FACTORY_RR_HEX)
        ctrlVillages.forEach(v=>{if(!cands.includes(v))cands.push(v);});
    }
    // Submerge: lacs traversable + lac↔lac teleport
    if(factionId==="acadiane"&&from.t==="lac")
      HEXES.forEach(h=>{if(h.t==="lac"&&h.id!==fromId&&!cands.includes(h.id))cands.push(h.id);});
  }
  
  return cands.filter(toId=>{
    const to=hMap[toId];if(!to)return false;
    // Lac: blocked unless Submerge (Acadiane slot 3)
    if(to.t==="lac"){
      return hasPosition&&factionId==="acadiane";
    }
    // Marécage: blocked unless Bayou Walk
    if(to.t==="marecage"&&!(hasPosition&&factionId==="bayou"))return false;
    // River crossing: only with Riverwalk + matching terrain
    if(adj.includes(toId)&&hasR(fromId,toId)){
      if(hasRiverwalk)return f.riverwalk.includes(to.t);
      return false;
    }
    return true;
  });
};

// Full movement: 1-step, or 2-step if Speed unlocked (slot 0)
const getValidMoves=(fromId,factionId,abilities,player,rails)=>{
  const step1=getValidMoves1Step(fromId,factionId,abilities,player,rails);
  if(!(abilities&&abilities.includes(0)))return step1; // no Speed
  // Speed: expand to 2-step reachable hexes
  const all=new Set(step1);
  step1.forEach(midId=>{
    getValidMoves1Step(midId,factionId,abilities,player,rails).forEach(id=>{
      if(id!==fromId)all.add(id);
    });
  });
  return[...all];
};

// ── TRANSPORT: Scythe mech/hero carry rules ──
// Mech: carries all friendly workers + all resources from origin hex
// Hero: carries all resources from origin hex (NOT workers)
// Returns { workers: [...], resources: {...} } with updated state
const transportUnits=(player, fromHex, toHex, unitType)=>{
  let p={...player, workers:[...player.workers], resources:{...player.resources}};
  // Deep copy resources
  Object.keys(player.resources).forEach(k=>{p.resources[k]={...player.resources[k]};});
  const fromKey=String(fromHex), toKey=String(toHex);
  const carried={workers:0, resTypes:[]};
  
  // Mech carries friendly workers on origin hex
  if(unitType==="mech"){
    const workersOnHex=p.workers.filter(w=>w.hexId===fromHex);
    if(workersOnHex.length>0){
      p.workers=p.workers.map(w=>w.hexId===fromHex?{...w,hexId:toHex}:w);
      carried.workers=workersOnHex.length;
    }
  }
  
  // Mech and Hero carry all resources on origin hex
  if((unitType==="mech"||unitType==="hero")&&p.resources[fromKey]){
    const fromRes=p.resources[fromKey];
    if(Object.keys(fromRes).length>0){
      if(!p.resources[toKey])p.resources[toKey]={};
      Object.entries(fromRes).forEach(([resType, qty])=>{
        if(qty>0){
          p.resources[toKey][resType]=(p.resources[toKey][resType]||0)+qty;
          carried.resTypes.push(`${qty}${resType}`);
        }
      });
      delete p.resources[fromKey];
    }
  }
  
  return{player:p, carried};
};

const createPlayer=(factionId,matId,isBot)=>{
  const f=FACTIONS[factionId],pm=MATS.find(m=>m.id===matId),hb=HOME_BASES[factionId];
  const heroHex=HEXES.reduce((best,h)=>{
    const d=Math.sqrt((h.rx-hb.rx)**2+(h.ry-hb.ry)**2);
    const db=best?Math.sqrt((best.rx-hb.rx)**2+(best.ry-hb.ry)**2):Infinity;
    return d<db&&h.t!=="lac"&&h.t!=="marecage"?h:best;
  },null);
  return{
    faction:factionId,matId,isBot,
    power:f.power,combatCards:f.cards,pop:pm.pop,coins:pm.coins,
    stars:0,hero:heroHex.id,
    workers:f.workerHex.map((hid,i)=>({id:`${factionId}_w${i}`,hexId:hid})),
    mechs:[],resources:{},lastCol:null,buildings:[],encounters:0,
    unlockedAbilities:[], // mech abilities unlocked in order: [0]=Speed, [1]=Riverwalk, [2]=Combat, [3]=Position
    topRow:pm.topRow,matName:pm.name,
    cubesOnTop:[...(pm.topCubes||[1,2,1,2])],cubesOnBottom:[0,0,0,0],
    enlistMap:[false,false,false,false], // which bottom cols have a recruit assigned
    objectiveChoices:null,objective:null,objectiveRevealed:false,fObjRevealed:false,
    capturedWorkers:0,capturedMech:0,empireKills:0,trapTokens:[],flagTokens:[],imperialCoins:0,
    upgrades:0,recruits:0,combatWins:0,
    starUpgrades:false,starMechs:false,starBuildings:false,starRecruits:false,
    fragments:0,visitedRR:false,factoryCard:null,
  };
};

// ══════════ BOT AI (unchanged) ══════════
const botTurn=(player,empire,enemyHexes,rails)=>{
  const f=FACTIONS[player.faction];
  const p={...player,workers:[...player.workers],mechs:[...player.mechs],resources:{...player.resources}};
  const logs=[];
  const cols=[0,1,2,3].filter(c=>c!==p.lastCol);
  const col=cols[Math.floor(Math.random()*cols.length)];
  const action=p.topRow[col];
  
  if(action==="Move"){
    // Nations Pack Up: free building move during Move action
    if(p.faction==="nations"&&(p.unlockedAbilities||[]).includes(3)&&(p.buildings||[]).length>0&&Math.random()<0.5){
      const bi=Math.floor(Math.random()*(p.buildings||[]).length);
      const bld=p.buildings[bi];
      const adjTargets=(ADJ[bld.hexId]||[]).filter(id=>{const h=hMap[id];return h&&h.t!=="lac"&&h.t!=="marecage"&&!(p.buildings||[]).some(b=>b.hexId===id);});
      if(adjTargets.length>0){
        const target=adjTargets[Math.floor(Math.random()*adjTargets.length)];
        p.buildings=[...(p.buildings||[])];
        p.buildings[bi]={...p.buildings[bi],hexId:target};
        const bt=BUILDING_TYPES.find(t=>t.type===bld.type);
        logs.push(`🤖📦 ${f.name}: Pack Up ${bt?bt.name:bld.type} #${bld.hexId}→#${target}`);
      }
    }
    const valid=getValidMoves(p.hero,p.faction,p.unlockedAbilities||[],p,rails);
    if(valid.length>0){
      const fromHex=p.hero;
      const target=valid[Math.floor(Math.random()*valid.length)];
      p.hero=target;
      // Hero carries resources
      const tr=transportUnits(p, fromHex, target, "hero");
      Object.assign(p,{resources:tr.player.resources});
      const tl=tr.carried.resTypes.length>0?` 📦${tr.carried.resTypes.join(",")}`:"";
      logs.push(`🤖 ${f.name}: ${f.hero} → #${target}${tl}`);
      // Bot Tierra Minada: Frente places trap after hero moves
      if(p.faction==="frente"&&(p.trapTokens||[]).length<4&&!(p.trapTokens||[]).some(t=>t.hexId===target)){
        p.trapTokens=[...(p.trapTokens||[]),{hexId:target,disarmed:false}];
        logs.push(`🤖🪤 ${f.name}: Trap #${target} (${p.trapTokens.length}/4)`);
      }
      // Bot Comptoir: Acadiane places flag after hero moves
      if(p.faction==="acadiane"&&(p.flagTokens||[]).length<4&&!(p.flagTokens||[]).some(fl=>fl.hexId===target)){
        p.flagTokens=[...(p.flagTokens||[]),{hexId:target}];
        logs.push(`🤖🏴 ${f.name}: Comptoir #${target} (${p.flagTokens.length}/4)`);
      }
    }
    // Bot worker: filter out enemy hexes
    if(p.workers.length>0){const wi=Math.floor(Math.random()*p.workers.length);let wv=getValidMoves(p.workers[wi].hexId,p.faction,p.unlockedAbilities||[],p,rails);if(enemyHexes)wv=wv.filter(id=>!enemyHexes.has(id));if(wv.length>0){const wt=wv[Math.floor(Math.random()*wv.length)];p.workers[wi]={...p.workers[wi],hexId:wt};logs.push(`🤖 ${f.name}: Ouv. → #${wt}`);}}
    else if(p.mechs.length>0){
      const mi=Math.floor(Math.random()*p.mechs.length);
      const fromHex=p.mechs[mi].hexId;
      const mv=getValidMoves(fromHex,p.faction,p.unlockedAbilities||[],p,rails);
      if(mv.length>0){
        const mt=mv[Math.floor(Math.random()*mv.length)];
        p.mechs[mi]={...p.mechs[mi],hexId:mt};
        // Mech carries workers + resources
        const tr=transportUnits(p, fromHex, mt, "mech");
        Object.assign(p,{workers:tr.player.workers,resources:tr.player.resources});
        let tl="";
        if(tr.carried.workers>0) tl+=` 👷×${tr.carried.workers}`;
        if(tr.carried.resTypes.length>0) tl+=` 📦${tr.carried.resTypes.join(",")}`;
        logs.push(`🤖 ${f.name}: Mech → #${mt}${tl}`);
      }
    }
  } else if(action==="Bolster"){
    if(p.coins>=1){
      p.coins--;
      const hasArsenal=(p.buildings||[]).some(b=>b.type==="arsenal");
      const hasMemorial=(p.buildings||[]).some(b=>b.type==="memorial");
      if(Math.random()>0.5){const bonus=hasArsenal?1:0;p.power=Math.min(p.power+2+bonus,16);logs.push(`🤖 ${f.name}: +${2+bonus} pui${hasArsenal?" (Arsenal)":""}`);}
      else{p.combatCards++;logs.push(`🤖 ${f.name}: +1 CC`);}
      if(hasMemorial){p.pop=Math.min(p.pop+1,18);logs.push(`🤖🪦 ${f.name}: +1 Pop (Mémorial)`);}
    }
    else logs.push(`🤖 ${f.name}: (pas d'$)`);
  } else if(action==="Produce"){
    if(!canPayProduce(p)){logs.push(`🤖 ${f.name}: (coût prod.)`);}else{
      payProduce(p);
      const byHex={};p.workers.forEach(w=>{if(!byHex[w.hexId])byHex[w.hexId]=[];byHex[w.hexId].push(w);});
      const hexIds=Object.keys(byHex).slice(0,2);
      hexIds.forEach(hidStr=>{
        const hid=parseInt(hidStr);const hex=hMap[hid];const t=TERRAINS[hex.t];let wc=byHex[hidStr].length;
        const hasMoulin=(p.buildings||[]).some(b=>b.type==="moulin"&&b.hexId===hid);
        if(hasMoulin)wc++;
        if(hex.t==="village"&&p.workers.length<8){for(let i=0;i<wc&&p.workers.length<8;i++)p.workers.push({id:`${p.faction}_w${p.workers.length}`,hexId:hid});logs.push(`🤖 ${f.name}: +ouv. #${hid}`);}
        else if(t.res&&t.res!=="ouvriers"){if(!p.resources[hidStr])p.resources[hidStr]={};p.resources[hidStr][t.res]=(p.resources[hidStr][t.res]||0)+wc;}
      });
      logs.push(`🤖 ${f.name}: Produce`);
    }
  } else if(action==="Trade"){
    if(p.coins>=1){const types=["metal","bois","nourriture","petrole"];const rt=types[Math.floor(Math.random()*types.length)];const wHex=p.workers.length>0?String(p.workers[0].hexId):String(p.hero);if(!p.resources[wHex])p.resources[wHex]={};p.resources[wHex][rt]=(p.resources[wHex][rt]||0)+2;p.coins--;logs.push(`🤖 ${f.name}: +2 ${rt}`);}
    else logs.push(`🤖 ${f.name}: (pas d'$)`);
  }
  p.lastCol=col;
  // Bot attempts bottom-row action
  const bottomAction=BOTTOM[col];
  const botCosts=getBottomCost(p);
  const bc=botCosts[col];
  // Nations "Esprit Sauvage": Deploy can use metal OR bois
  const canAffordBottom=bc&&(countRes(p,bc.res)>=bc.qty||(bottomAction==="Deploy"&&p.faction==="nations"&&countRes(p,"bois")>=bc.qty));
  if(canAffordBottom){
    if(bottomAction==="Upgrade"&&(p.upgrades||0)<6){
      const sp=spendRes(p,bc.res,bc.qty);Object.assign(p,{resources:sp.resources});
      // Bot picks random valid top source and bottom dest for cube
      const mat=MATS.find(m=>m.id===p.matId);
      const validTop=[];const validBottom=[];
      if(mat){
        (p.cubesOnTop||[]).forEach((c,i)=>{if(c>0)validTop.push(i);});
        (mat.bottomSlots||[]).forEach((s,i)=>{if((p.cubesOnBottom||[])[i]<s)validBottom.push(i);});
      }
      if(validTop.length>0&&validBottom.length>0){
        const fromC=validTop[Math.floor(Math.random()*validTop.length)];
        const toC=validBottom[Math.floor(Math.random()*validBottom.length)];
        p.cubesOnTop=[...(p.cubesOnTop||[])];p.cubesOnTop[fromC]--;
        p.cubesOnBottom=[...(p.cubesOnBottom||[])];p.cubesOnBottom[toC]++;
        p.coins+=(mat.bottomCosts[toC].bonus||0);
      }
      p.upgrades=(p.upgrades||0)+1;
      if(p.upgrades>=6&&!p.starUpgrades){p.stars++;p.starUpgrades=true;logs.push(`⭐ ${f.name}: 6 upgrades !`);}
      logs.push(`🤖 ${f.name}: Upgrade ${p.upgrades}/6`);
    } else if(bottomAction==="Deploy"&&p.mechs.length<4){
      const wh=getWorkerHexes(p);
      if(wh.length>0){
        // Nations: pick metal if available, else bois
        const deployRes=(p.faction==="nations"&&countRes(p,bc.res)<bc.qty)?"bois":bc.res;
        const sp=spendRes(p,deployRes,bc.qty);Object.assign(p,{resources:sp.resources});
        const th=wh[Math.floor(Math.random()*wh.length)];
        const abilityIdx=p.mechs.length; // 0=Speed,1=Riverwalk,2=Combat,3=Position
        const abilityNames=["Speed","Riverwalk","Combat","Position"];
        p.mechs.push({id:`${p.faction}_m${p.mechs.length}`,hexId:th});
        p.unlockedAbilities=[...(p.unlockedAbilities||[]),abilityIdx];
        if(p.mechs.length>=4&&!p.starMechs){p.stars++;p.starMechs=true;logs.push(`⭐ ${f.name}: 4 mechas !`);}
        logs.push(`🤖 ${f.name}: Deploy #${th} → 🔓 ${abilityNames[abilityIdx]}`);
      }
    } else if(bottomAction==="Build"&&(p.buildings||[]).length<4){
      const wh=getWorkerHexes(p).filter(h=>!(p.buildings||[]).some(b=>b.hexId===h));
      const avail=BUILDING_TYPES.filter(bt=>!(p.buildings||[]).some(b=>b.type===bt.type));
      if(wh.length>0&&avail.length>0){
        const sp=spendRes(p,bc.res,bc.qty);Object.assign(p,{resources:sp.resources});
        p.buildings=[...(p.buildings||[]),{type:avail[0].type,hexId:wh[0]}];
        if(p.buildings.length>=4&&!p.starBuildings){p.stars++;p.starBuildings=true;logs.push(`⭐ ${f.name}: 4 bâtiments !`);}
        logs.push(`🤖 ${f.name}: Build ${avail[0].name} #${wh[0]}`);
        // Bot Gare: generate 3 random rail segments
        if(avail[0].type==="gare"){
          let railFrom=wh[0];
          for(let ri=0;ri<3;ri++){
            const adjH=(ADJ[railFrom]||[]).filter(id=>{
              const h=hMap[id];if(!h)return false;
              return!rails.some(([a,b])=>(a===railFrom&&b===id)||(a===id&&b===railFrom));
            });
            if(adjH.length>0){
              const to=adjH[Math.floor(Math.random()*adjH.length)];
              if(!p._pendingRails)p._pendingRails=[];
              p._pendingRails.push([railFrom,to]);
              logs.push(`🤖🛤 ${f.name}: Rail #${railFrom}↔#${to}`);
              railFrom=to;
            }
          }
        }
      }
    } else if(bottomAction==="Enlist"&&(p.recruits||0)<4){
      const sp=spendRes(p,bc.res,bc.qty);Object.assign(p,{resources:sp.resources});
      p.recruits=(p.recruits||0)+1;
      // Pick random unassigned bottom col for recruit
      const freeSlots=[0,1,2,3].filter(ci=>!(p.enlistMap||[])[ci]);
      if(freeSlots.length>0){
        const pick=freeSlots[Math.floor(Math.random()*freeSlots.length)];
        p.enlistMap=[...(p.enlistMap||[false,false,false,false])];
        p.enlistMap[pick]=true;
        // Immediate bonus matching the column
        const imm=[
          pp=>{pp.power=Math.min(pp.power+2,16);},
          pp=>{pp.coins+=2;},
          pp=>{pp.pop=Math.min(pp.pop+2,18);},
          pp=>{pp.combatCards+=2;},
        ][pick];
        if(imm)imm(p);
        logs.push(`🤖 ${f.name}: Enlist → ${BOTTOM[pick]} (${ENLIST_ONGOING[pick].icon})`);
      }
      if(p.recruits>=4&&!p.starRecruits){p.stars++;p.starRecruits=true;logs.push(`⭐ ${f.name}: 4 recrues !`);}
    }
  }
  if(p.objective&&!p.objectiveRevealed&&p.objective.check(p)){p.objectiveRevealed=true;p.stars++;logs.push(`⭐ ${f.name}: objectif !`);}
  const fObj=FACTIONS[p.faction]?.fObj;
  if(fObj&&!p.fObjRevealed&&fObj.check(p)){p.fObjRevealed=true;p.stars++;logs.push(`🏛⭐ ${f.name}: obj. faction !`);}
  // Dominion Commerce Impérial: 1×/turn, convert 1 resource → 2$ or 1CC
  if(p.faction==="dominion"){
    const resTypes=["metal","bois","nourriture","petrole"];
    const available=resTypes.filter(r=>countRes(p,r)>=1);
    if(available.length>0){
      const pick=available[Math.floor(Math.random()*available.length)];
      const sp=spendRes(p,pick,1);Object.assign(p,{resources:sp.resources});
      if(Math.random()<0.6){p.coins+=2;p.imperialCoins=(p.imperialCoins||0)+2;logs.push(`🤖🏛 ${f.name}: Commerce -1${pick}→+2$`);}
      else{p.combatCards++;logs.push(`🤖🏛 ${f.name}: Commerce -1${pick}→+1CC`);}
    }
  }
  return{player:p,logs,bottomCol:canAffordBottom?col:-1};
};

// ══════════ SVG RENDERING HELPERS (enhanced v2) ══════════

// Seeded random for consistent per-hex decorations
const seededRand=(seed)=>{let s=seed*9301+49297;return()=>{s=(s*49297+233280)%233280;return s/233280;};};

// Terrain-specific SVG decorations rendered inside each hex
const TerrainDecor=React.memo(({hex})=>{
  const rng=seededRand(hex.id*137+hex.rx);
  const cx=hex.rx,cy=hex.ry;
  
  if(hex.t==="foret"){
    // 3-5 triangular trees
    const trees=[];
    for(let i=0;i<4;i++){
      const tx=cx-20+rng()*40,ty=cy-18+rng()*28,sz=5+rng()*6;
      trees.push(<g key={i} opacity={0.3+rng()*0.2}>
        <polygon points={`${tx},${ty-sz} ${tx-sz*0.5},${ty+sz*0.3} ${tx+sz*0.5},${ty+sz*0.3}`} fill="#1a4a1a"/>
        <polygon points={`${tx},${ty-sz*0.6} ${tx-sz*0.4},${ty+sz*0.1} ${tx+sz*0.4},${ty+sz*0.1}`} fill="#2a5a2a"/>
        <line x1={tx} y1={ty+sz*0.3} x2={tx} y2={ty+sz*0.5} stroke="#3a2a1a" strokeWidth="1"/>
      </g>);
    }
    return <g style={{pointerEvents:"none"}}>{trees}</g>;
  }
  if(hex.t==="montagne"||hex.t==="sierra"){
    const isS=hex.t==="sierra";
    // 2-3 mountain peaks
    const peaks=[];
    for(let i=0;i<(isS?2:3);i++){
      const px=cx-18+rng()*36,py=cy-6+rng()*14,sz=10+rng()*10;
      const c1=isS?"#8a7050":"#6a7580",c2=isS?"#a08060":"#8a95a0";
      peaks.push(<g key={i} opacity={0.35}>
        <polygon points={`${px},${py-sz} ${px-sz*0.7},${py+sz*0.3} ${px+sz*0.7},${py+sz*0.3}`} fill={c1}/>
        <polygon points={`${px},${py-sz} ${px-sz*0.15},${py-sz*0.3} ${px+sz*0.3},${py-sz*0.2}`} fill={c2}/>
      </g>);
    }
    return <g style={{pointerEvents:"none"}}>{peaks}</g>;
  }
  if(hex.t==="village"){
    // 2-3 tiny houses
    const houses=[];
    for(let i=0;i<3;i++){
      const hx=cx-16+rng()*32,hy=cy-10+rng()*16,sz=4+rng()*3;
      houses.push(<g key={i} opacity={0.3}>
        <rect x={hx-sz} y={hy} width={sz*2} height={sz*1.3} fill="#7a3a1a" rx="0.5"/>
        <polygon points={`${hx-sz-1},${hy} ${hx},${hy-sz} ${hx+sz+1},${hy}`} fill="#5a2a10"/>
        <rect x={hx-1} y={hy+sz*0.4} width={2} height={sz*0.9} fill="#c4a040" opacity="0.5"/>
      </g>);
    }
    return <g style={{pointerEvents:"none"}}>{houses}</g>;
  }
  if(hex.t==="lac"){
    // Animated concentric ripples
    return(<g style={{pointerEvents:"none"}} opacity={0.15}>
      <circle cx={cx-8+rng()*16} cy={cy-4+rng()*8} r="8" fill="none" stroke="#80b8e0" strokeWidth="0.6"><animate attributeName="r" values="4;14;4" dur={`${3+rng()*2}s`} repeatCount="indefinite"/><animate attributeName="opacity" values="0.4;0;0.4" dur={`${3+rng()*2}s`} repeatCount="indefinite"/></circle>
      <circle cx={cx+5+rng()*10} cy={cy+3+rng()*6} r="6" fill="none" stroke="#80b8e0" strokeWidth="0.5"><animate attributeName="r" values="3;11;3" dur={`${4+rng()*2}s`} begin="1.5s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.3;0;0.3" dur={`${4+rng()*2}s`} begin="1.5s" repeatCount="indefinite"/></circle>
    </g>);
  }
  if(hex.t==="marecage"){
    // Lily pads + ripple
    return(<g style={{pointerEvents:"none"}} opacity={0.25}>
      <ellipse cx={cx-10} cy={cy-4} rx="5" ry="3.5" fill="#3a6a3a" opacity="0.5"/>
      <ellipse cx={cx+12} cy={cy+6} rx="4" ry="3" fill="#2a5a2a" opacity="0.4"/>
      <circle cx={cx+2} cy={cy+2} r="6" fill="none" stroke="#5a9a6a" strokeWidth="0.4"><animate attributeName="r" values="3;10;3" dur="5s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.3;0;0.3" dur="5s" repeatCount="indefinite"/></circle>
    </g>);
  }
  if(hex.t==="desert"){
    // Sand dunes + cactus
    return(<g style={{pointerEvents:"none"}} opacity={0.2}>
      <path d={`M${cx-22} ${cy+6}Q${cx-10} ${cy-4} ${cx} ${cy+4}Q${cx+12} ${cy+10} ${cx+22} ${cy+2}`} fill="none" stroke="rgba(0,0,0,0.15)" strokeWidth="1.5"/>
      <line x1={cx+rng()*10} y1={cy+2} x2={cx+rng()*10} y2={cy-10} stroke="#5a8040" strokeWidth="1.5" strokeLinecap="round"/>
      <line x1={cx+rng()*10-3} y1={cy-5} x2={cx+rng()*10} y2={cy-7} stroke="#5a8040" strokeWidth="1" strokeLinecap="round"/>
    </g>);
  }
  if(hex.t==="champs"){
    // Wheat rows
    return(<g style={{pointerEvents:"none"}} opacity={0.15}>
      {[0,1,2,3].map(i=><line key={i} x1={cx-20} y1={cy-10+i*8} x2={cx+20} y2={cy-10+i*8} stroke="#8a7020" strokeWidth="0.8" strokeDasharray="3 5"/>)}
    </g>);
  }
  if(hex.t==="plaine"){
    // Grass tufts
    return(<g style={{pointerEvents:"none"}} opacity={0.15}>
      {[0,1,2].map(i=>{const gx=cx-14+rng()*28,gy=cy-6+rng()*14;return(
        <g key={i}><line x1={gx} y1={gy} x2={gx-2} y2={gy-5} stroke="#4a7a30" strokeWidth="0.8" strokeLinecap="round"/><line x1={gx} y1={gy} x2={gx+2} y2={gy-6} stroke="#5a8a3a" strokeWidth="0.7" strokeLinecap="round"/><line x1={gx} y1={gy} x2={gx} y2={gy-7} stroke="#4a7a30" strokeWidth="0.8" strokeLinecap="round"/></g>
      );})}
    </g>);
  }
  if(hex.t==="toundra"){
    // Snow patches
    return(<g style={{pointerEvents:"none"}} opacity={0.12}>
      <ellipse cx={cx-8} cy={cy+3} rx="10" ry="4" fill="#8aa0b0"/>

});

const HexTerrain=React.memo(({hex,isV,isSel,isHov,isFactory})=>{
  const t=TERRAINS[hex.t];
  const isWater=hex.t==="lac"||hex.t==="marecage";
  return(
    <g>
      {/* Deep shadow */}
      <polygon points={hPts(hex.rx+3,hex.ry+4)} fill="rgba(0,0,0,0.6)" opacity={0.5}/>
      {/* Ambient occlusion ring */}
      <polygon points={hPts(hex.rx,hex.ry,HS+2)} fill="none" stroke="rgba(0,0,0,0.3)" strokeWidth={3} style={{pointerEvents:"none"}}/>
      {/* Base with gradient fill */}
      <polygon points={hPts(hex.rx,hex.ry)}
        fill={`url(#tg-${hex.t})`}
        stroke={isV?"#FFD700":isSel?"#e8dcc8":isHov?t.stroke:"rgba(8,7,4,0.85)"}
        strokeWidth={isV?3:isSel?2.5:isHov?2:1.2}
        opacity={isWater?0.6:0.93}
      />
      {/* Texture pattern overlay */}
      <polygon points={hPts(hex.rx,hex.ry)} fill={`url(#tp-${hex.t})`} opacity={isWater?0.5:0.75} style={{pointerEvents:"none"}}/>
      {/* Inner bevel highlight (top edge) */}
      <polygon points={hPts(hex.rx-0.5,hex.ry-1.5)} fill="none" stroke="rgba(255,255,240,0.08)" strokeWidth={0.7} style={{pointerEvents:"none"}}/>
      {/* Bottom edge shadow */}
      <polygon points={hPts(hex.rx+0.5,hex.ry+1)} fill="none" stroke="rgba(0,0,0,0.12)" strokeWidth={0.8} style={{pointerEvents:"none"}}/>
      {/* Terrain decorations */}
      <TerrainDecor hex={hex}/>
      {/* Factory special effects */}
      {isFactory&&<>
        <polygon points={hPts(hex.rx,hex.ry,HS+6)} fill="none" stroke="#c4a747" strokeWidth={0.8} opacity={0.25} strokeDasharray="6 4"><animateTransform attributeName="transform" type="rotate" from={`0 ${hex.rx} ${hex.ry}`} to={`360 ${hex.rx} ${hex.ry}`} dur="60s" repeatCount="indefinite"/></polygon>
        <polygon points={hPts(hex.rx,hex.ry)} fill="none" stroke="#ff5522" strokeWidth={2} opacity={0.12}><animate attributeName="opacity" values="0.05;0.2;0.05" dur="3s" repeatCount="indefinite"/></polygon>
        {/* Inner glow */}
        <polygon points={hPts(hex.rx,hex.ry,HS-8)} fill="rgba(255,120,40,0.06)"><animate attributeName="opacity" values="0.03;0.1;0.03" dur="2s" repeatCount="indefinite"/></polygon>
      </>}
      {/* Valid move overlay */}
      {isV&&<>
        <polygon points={hPts(hex.rx,hex.ry)} fill="rgba(255,215,0,0.1)" stroke="#FFD700" strokeWidth={2.5} opacity={0.8}><animate attributeName="opacity" values="0.3;0.9;0.3" dur="1.4s" repeatCount="indefinite"/></polygon>
        <polygon points={hPts(hex.rx,hex.ry,HS-6)} fill="none" stroke="#FFD700" strokeWidth={0.8} opacity={0.3}><animate attributeName="opacity" values="0.1;0.5;0.1" dur="1.4s" repeatCount="indefinite"/></polygon>
      </>}
    </g>
  );
});
